server:
  port: 8083

spring:
  application:
    name: user-service
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: 27017
      database: vixen_users
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024}
  expiration: 86400000

logging:
  level:
    com.vixen: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
