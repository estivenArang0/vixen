server:
  port: 8087

spring:
  application:
    name: notification-service
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: 27017
      database: vixen_notifications
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.vixen: INFO
