server:
  port: 8088

spring:
  application:
    name: review-service
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: 27017
      database: vixen_reviews
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

logging:
  level:
    com.vixen.review: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: INFO
