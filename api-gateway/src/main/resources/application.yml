server:
  port: 8080

spring:
  application:
    name: api-gateway

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

services:
  user:
    url: ${USER_SERVICE_URL:http://localhost:8083}
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}
  cart:
    url: ${CART_SERVICE_URL:http://localhost:8084}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
  shipping:
    url: ${SHIPPING_SERVICE_URL:http://localhost:8086}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
  review:
    url: ${REVIEW_SERVICE_URL:http://localhost:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.vixen.gateway: INFO
    org.springframework.cloud.gateway: WARN
