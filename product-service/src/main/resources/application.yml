server:
  port: 8081

spring:
  application:
    name: product-service
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: 27017
      database: vixen_products
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
    elasticsearch:
      uris: ${ELASTICSEARCH_URI:http://localhost:9200}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
